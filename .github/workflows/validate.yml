name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite
        run: npm test

      - name: Regenerate host outputs
        run: npm run os:gen:all

      - name: Fail on generated drift
        run: git diff --exit-code

      - name: Smoke legacy CLI install
        run: |
          tmp="$(mktemp -d)"
          HOME="$tmp" npx --yes "file:$PWD" install --agent pi
          test -f "$tmp/.pi/agent/skills/founder-partner/SKILL.md"

      - name: Smoke OS host installs
        run: |
          tmp="$(mktemp -d)"

          HOME="$tmp" npm run os:install -- --host pi
          test -f "$tmp/.pi/agent/skills/founder-skills-os/partner/founder-partner/SKILL.md"

          npm run os:install -- --host claude-code --scope project --project "$tmp"
          test -f "$tmp/.claude/skills/founder-skills-os/workspace/project-instructions.md"
          grep -q "Founder Skills OS" "$tmp/CLAUDE.md"

          npm run os:install -- --host codex --project "$tmp"
          test -f "$tmp/.codex/founder-skills-os/workspace/project-instructions.md"
          grep -q "Founder Skills OS for Codex" "$tmp/AGENTS.md"

          npm run os:install -- --host opencode --project "$tmp"
          test -f "$tmp/.opencode/founder-skills-os/workspace/project-instructions.md"
          grep -q "Founder Skills OS for OpenCode" "$tmp/AGENTS.md"

          npm run os:install -- --host openclaw --project "$tmp"
          test -f "$tmp/.openclaw/founder-skills-os/workspace/project-instructions.md"
          grep -q "Founder Skills OS for OpenClaw" "$tmp/AGENTS.md"

          HOME="$tmp" npm run os:install -- --host hermes
          test -f "$tmp/.hermes/skills/founder-skills-os/workspace/project-instructions.md"

      - name: Verify npm package contents
        run: npm run pack:dry-run
