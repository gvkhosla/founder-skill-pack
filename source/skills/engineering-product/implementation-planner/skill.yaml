name: implementation-planner
description: Turns a scoped MVP into a concrete, founder-readable implementation plan. Use when scope is defined but build confidence is low. Produces implementation-plan.md.
invocations:
  - Help me plan the build
  - How should we implement this?
outputs:
  - implementation-plan.md
depends_on:
  - mvp-brief.md
  - positioning.md
feeds_into:
  - architecture-overview.md
  - qa-report.md
  - release-readiness.md
checks:
  - specific_recommendation
  - concrete_output
  - next_step_present
readiness_gate: build-readiness
supported_hosts:
  - pi
  - claude-code
  - codex
  - opencode
  - chatgpt
  - claude-chat
  - openclaw
  - hermes
