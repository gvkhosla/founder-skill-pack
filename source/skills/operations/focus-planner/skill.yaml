name: focus-planner
description: Locks the one focus that matters most for the next working cycle. Use when priorities are scattered or after a weekly review. Produces focus-plan.md.
invocations:
  - Help me focus
  - Plan next week's focus
outputs:
  - focus-plan.md
checks:
  - one_focus_present
  - tradeoffs_present
supported_hosts:
  - pi
  - claude-code
  - codex
  - opencode
  - chatgpt
  - claude-chat
  - openclaw
  - hermes
